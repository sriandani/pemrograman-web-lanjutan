<html>
    <head>
        <title>belajar tabel html</title>

        <link rel="stylesheet" href="jquery.dataTables.min.css"></link>
        <script src="jquery-3.7.0.min.js"></script> 
        <script src="jquery.dataTables.min.js"></script>
    </head>
    <body>
        <table border="1" cellpadding="10" id="table1">

            <th>Nama Buah</th>

        </thead>
        <tr>
            <td>Apel Merah</td>

            <td>Rp 28.000</td>
            <td>10</td>
            <td><a href="#">Probolinggo Jaya</a></td>
        </tr>
        <tr>
            <td>Pisang Raja</td>
            <td>Rp 15.000</td>

        </tr>
        </table>

        <script>
            $(document).ready(function () {
                $('#table1').DataTable();
            });
        </script>
    </body>
</html>
